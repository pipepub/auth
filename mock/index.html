<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock OAuth Provider - PipePub Test</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Style -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="test mock">
    <!-- PipePub test OAUTH2 MOCK service file: mock/index.html -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                <div class="card mock-card">
                    <div class="card-header bg-dark text-white">
                        <h1 class="display-6 mb-2">
                            <i class="bi bi-flask"></i> Provider Mock
                        </h1>
                        <p class="mb-0 opacity-75">PipePub Test Environment</p>
                        <div class="mt-2">
                            <span class="badge bg-warning text-dark"><i class="bi bi-flask"></i> TEST MODE - Mock OAuth Server</span>
                        </div>
                    </div>
                    <div class="card-body p-4">                        
                        <!-- Validation Result -->
                        <div id="validationResult" class="mb-3"></div>
                        <!-- Mock User Info (Display only - no inputs) -->
                        <div class="mb-4">
                            <h5><i class="bi bi-person-badge"></i> Authorizing As</h5>
                            <div class="mock-user-card">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mock-label"><i class="bi bi-person"></i> Mock User</div>
                                        <div class="mock-value">Mock Test User</div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mock-label"><i class="bi bi-envelope"></i> Email</div>
                                        <div class="mock-value">test@pipepub.dev</div>
                                    </div>
                                    <div class="col-md-6 mt-2">
                                        <div class="mock-label"><i class="bi bi-hash"></i> User ID</div>
                                        <div class="mock-value">test_12345_user</div>
                                    </div>
                                    <div class="col-md-6 mt-2">
                                        <div class="mock-label"><i class="bi bi-shield-check"></i> Account Type</div>
                                        <div class="mock-value">Test Account</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Mock Behavior Options -->
                        <div class="mb-4">
                            <div class="mt-2">
                                <label class="form-label small">Custom Authorization Code (optional)</label>
                                <input type="text" id="customCode" class="form-control form-control-sm" 
                                       placeholder="Leave empty for auto-generated">
                            </div>
                        </div>
                        <!-- Action Buttons -->
                        <div class="d-flex gap-2">
                            <button id="approveBtn" class="btn btn-success w-100 fw-semibold flex-grow-1 py-2">
                                Approve
                            </button>
                            <button id="denyBtn" class="btn btn-danger w-100 fw-semibold flex-grow-1 py-2">
                                Deny Access
                            </button>
                        </div>
                        <hr>
                        <!-- Debug Info -->
                        <div class="mt-3">
                            <details>
                                <summary class="text-muted small">Authorization Request</summary>
                                <div class="param-box" id="requestParams">
                                    Loading...
                                </div>
                                <button class="btn btn-secondary mt-2" id="copyButton">
                                    <i class="bi bi-clipboard"></i> Copy Request
                                </button>
                            </details>
                        </div>
                        <!-- PipePub footer -->
                        <hr>
                        <div class="footer text-center mb-2">
                            <p class="mb-4">
                                <a href="https://github.com/pipepub/pipepub" title="PipePub main repository"><img src="https://pipepub.github.io/cdn/image/badge/logo/pipepub.svg" height="22" alt="PipePub main repository"></a>
                                <a href="https://github.com/pipepub/pipepub/blob/main/README.md" title="PipePub readme doc"><img src="https://pipepub.github.io/cdn/image/badge/doc/readme.svg" height="22" alt="PipePub readme doc"></a>
                                <a href="https://github.com/pipepub/pipepub/blob/main/docs/INDEX.md" title="PipePub docs index"><img src="https://pipepub.github.io/cdn/image/badge/doc/index.svg" height="22" alt="PipePub docs index"></a>
                                <a href="https://github.com/pipepub/pipepub/blob/main/CHANGELOG.md" title="PipePub version"><img src="https://pipepub.github.io/cdn/image/badge/version/current.svg" height="22" alt="PipePub version"></a>
                                <a href="https://github.com/pipepub/pipepub/blob/main/LICENSE" title="PipePub license"><img src="https://pipepub.github.io/cdn/image/badge/license/current.svg" height="22" alt="PipePub license"></a>
                            </p>
                            <a href="https://github.com/pipepub" title="PipePub - Publish like a PRO">
                                <img src="https://pipepub.github.io/cdn/image/logo/pipepub.png" width="116" height="48" alt="PipePub - Publish like a PRO">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../assets/js/mock.js"></script>
</body>
</html>
